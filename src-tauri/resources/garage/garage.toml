########################################
# BASIC CLUSTER CONFIG (SINGLE NODE)
########################################

replication_factor = 1              # ⚠️ 1 node thì phải = 1 (3 sẽ lỗi)
consistency_mode = "consistent"

########################################
# STORAGE (ALL IN ONE FOLDER)
########################################

metadata_dir = "./data/meta"
data_dir = "./data/data"
metadata_snapshots_dir = "./data/snapshots"

metadata_fsync = true
data_fsync = false                 # tăng tốc local (có thể bật true nếu cần an toàn)

########################################
# DATABASE
########################################

db_engine = "lmdb"
lmdb_map_size = "10G"              # giảm từ 1T xuống cho local

########################################
# PERFORMANCE
########################################

block_size = "1M"
block_ram_buffer_max = "128MiB"    # giảm nhẹ cho máy local
block_max_concurrent_reads = 8
block_max_concurrent_writes_per_request = 4

compression_level = 1

########################################
# RPC (INTERNAL COMMUNICATION)
########################################

rpc_secret = "4425f5c26c5e11581d3223904324dcb5b5d5dfb14e5e7f35e38c595424f5f1e6"   # ⚠️ đổi nếu dùng thật

rpc_bind_addr = "127.0.0.1:3901"
# rpc_public_addr không cần cho single node

########################################
# 🚫 DISCOVERY (DISABLED FOR LOCAL)
########################################

