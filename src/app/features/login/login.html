<div class="min-h-screen flex items-center justify-center login-bg">
    <div class="w-full max-w-md p-8 rounded-2xl shadow-2xl login-card">
        <h2 class="text-3xl font-bold text-center mb-6 login-title">Garage Manager</h2>

        <p class="text-center mb-8 login-subtitle">Log in to the S3 storage system</p>

        <form class="space-y-5">
            <app-text-input label="Email" [formField]="loginForm.userName" placeholder="User Name">
            </app-text-input>

            <app-text-input
                label="Password"
                [formField]="loginForm.password"
                placeholder="Password"
            >
            </app-text-input>

            <app-button
                class="w-full login-btn"
                icon="trash"
                status="primary"
                (buttonClick)="signIn()"
            >
                Login
            </app-button>
        </form>
    </div>
</div>
