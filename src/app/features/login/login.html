<div class="min-h-screen flex items-center justify-center login-bg">
    <div class="w-full max-w-md p-8 rounded-2xl shadow-2xl login-card">
        <h2 class="text-3xl font-bold text-center mb-6 login-title">Garage Manager</h2>

        <p class="text-center mb-8 login-subtitle">Log in to the S3 storage system</p>

        <div class="space-y-5">
            <app-text-input
                label="Admin token"
                [formField]="loginForm.adminToken"
                placeholder="Admin token"
            >
            </app-text-input>

            

            <div class="flex gap-2">
                <app-button
                    class="w-full rounded-xl login-btn"
                    icon="trash"
                    status="primary"
                    (click)="genTokenAdmin()"
                >
                    Gen Admin Token
                </app-button>

                <app-button
                    class="w-full rounded-xl login-btn"
                    icon="trash"
                    status="success"
                    (click)="goToManager()"
                >
                    Go to Manager
                </app-button>
            </div>
        </div>
    </div>
</div>
