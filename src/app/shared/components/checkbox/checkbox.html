<label class="checkbox">
    @if (formField) {
        <!-- MODE SIGNAL FORMS -->
        <input type="checkbox" [formField]="formField" />
    } @else {
        <!-- MODE STANDALONE -->
        <input
            type="checkbox"
            [checked]="checked()"
            [disabled]="disabled"
            (click)="onInputChange($event)"
        />
    }

    <span class="checkbox-box">
        <svg viewBox="0 0 24 24" class="checkbox-icon">
            <path
                d="M20 6L9 17L4 12"
                fill="none"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
            />
        </svg>
    </span>

    <span class="checkbox-label"> {{ label }} </span>
</label>
